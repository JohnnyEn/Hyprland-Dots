# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules
# This file will not be modified during dotfiles updates

# fzf-clip script
windowrule {
  name = fzfclipWindowRule1
  size = monitor_w*0.65 monitor_h*0.65
  match:class = fzf-clip
}

windowrule {
  name = fzfclipWindowRule2
  float = on
  match:class = ^(fzf-clip)$
}

windowrule {
  name = feh
  float = on
  match:class = feh
}

windowrule {
  name = alacrittyWindowrule
  workspace = 1
  match:class = Alacritty
}

windowrule {
  name = vscWindowrule
  workspace = 2
  match:class = code
}

windowrule {
  name = novelWriterWindowrule
  workspace = 2
  match:class = novelWriter
}

windowrule {
  name = vivaldiWindowrule
  workspace = 3
  match:class = vivaldi-stable
}

windowrule {
  name = librewolfWindowrule
  workspace = 3
  match:class = librewolf
}

windowrule {
  name = elementWindowrule
  workspace = 4
  match:class = Element
}

windowrule {
  name = joplinWindowrule
  workspace = 4
  match:class = @joplin/app-desktop
}

# Music controller script
windowrule {
  name = musicControllerWindowrule
  float = on
  size = (monitor_w*0.45) (monitor_h*0.45)
  center = on
  stay_focused = on
  match:title = ^(Music Controller)$
}
